<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <filter id="glow-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b1"/>
      <feGaussianBlur stdDeviation="10" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sharp" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="5" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a0004"/>
      <stop offset="50%" stop-color="#0d0002"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <rect width="192" height="192" rx="44" fill="url(#bg)"/>

  <!-- Outer ambient glow -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="#e8394a" stroke-width="12" opacity="0.08"/>
  <circle cx="96" cy="96" r="72" fill="none" stroke="#e8394a" stroke-width="6" opacity="0.12"/>

  <!-- Outer ring base -->
  <circle cx="96" cy="96" r="68" fill="none" stroke="#8b0010" stroke-width="1.5" opacity="0.5"/>

  <!-- Outer ring bright arc -->
  <path d="M96 28 A68 68 0 1 1 50 152" fill="none" stroke="#ff2030" stroke-width="2.8" stroke-linecap="round" filter="url(#glow-sharp)"/>

  <!-- Inner ambient glow -->
  <circle cx="96" cy="96" r="55" fill="none" stroke="#e8394a" stroke-width="8" opacity="0.07"/>

  <!-- Inner ring base -->
  <circle cx="96" cy="96" r="52" fill="none" stroke="#7a000e" stroke-width="1" opacity="0.4"/>

  <!-- Inner ring bright arc — offset -->
  <path d="M96 44 A52 52 0 1 0 141 128" fill="none" stroke="#ff4455" stroke-width="2.2" stroke-linecap="round" filter="url(#glow-sharp)"/>

  <!-- Flare highlight outer top-right -->
  <path d="M140 42 A68 68 0 0 1 158 96" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7" filter="url(#glow-soft)"/>

  <!-- Flare highlight inner -->
  <path d="M130 52 A52 52 0 0 1 148 96" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5" filter="url(#glow-soft)"/>
</svg>
